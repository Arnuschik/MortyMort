<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Until we meet again</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --ink: #1a1610;
    --ink-soft: #3d3730;
    --muted: #8a8278;
    --accent: #8b6f5e;
    --border: rgba(26,22,16,0.12);
  }

  html, body {
    height: 100%;
    background: var(--warm-white);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    overflow: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Decorative corner marks */
  body::after {
    content: '';
    position: fixed;
    inset: 28px;
    border: 0.5px solid var(--border);
    pointer-events: none;
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2rem;
  }

  /* Corner ornaments */
  .corner {
    position: fixed;
    width: 20px;
    height: 20px;
    z-index: 3;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 22px; left: 22px; }
  .corner.tr { top: 22px; right: 22px; transform: scaleX(-1); }
  .corner.bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
  .corner.br { bottom: 22px; right: 22px; transform: scale(-1); }

  .label-top {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    text-align: center;
    line-height: 1.25;
    letter-spacing: 0.01em;
    margin-bottom: 0.3rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.4s forwards;
  }

  .names .amp {
    font-style: normal;
    font-weight: 200;
    color: var(--muted);
    font-size: 0.75em;
    margin: 0 0.3em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.4rem 0 1.6rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }
  .divider-line { width: 60px; height: 0.5px; background: var(--border); }
  .divider-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
  }

  .countdown {
    display: flex;
    align-items: flex-start;
    gap: 0;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 clamp(14px, 3vw, 28px);
  }

  .unit + .unit {
    border-left: 0.5px solid var(--border);
  }

  .unit-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 80px);
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.03em;
    min-width: 1.6ch;
    text-align: center;
    transition: color 0.3s;
  }

  .unit-lbl {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }

  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    font-weight: 300;
    color: var(--muted);
    margin-top: 1.8rem;
    letter-spacing: 0.04em;
    min-height: 20px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
    transition: color 0.4s;
  }

  /* Date setter */
  .date-setter {
    margin-top: 2.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
  }

  .date-setter-label {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .date-setter input[type="datetime-local"] {
    background: transparent;
    border: none;
    border-bottom: 0.5px solid var(--border);
    padding: 6px 2px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-align: center;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    width: 220px;
  }

  .date-setter input:hover,
  .date-setter input:focus {
    border-color: var(--accent);
  }

  /* Celebrate state */
  .unit-num.celebrate { color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Subtle pulse on seconds */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .unit-num.ticking { animation: pulse 1s ease-in-out infinite; }
</style>
</head>
<body>

<!-- Corner ornaments -->
<div class="corner tl">
  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 18 L2 2 L18 2" stroke="rgba(26,22,16,0.25)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<div class="corner tr">
  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 18 L2 2 L18 2" stroke="rgba(26,22,16,0.25)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<div class="corner bl">
  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 18 L2 2 L18 2" stroke="rgba(26,22,16,0.25)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<div class="corner br">
  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 18 L2 2 L18 2" stroke="rgba(26,22,16,0.25)" stroke-width="0.5" fill="none"/>
  </svg>
</div>

<div class="page">
  <div class="label-top">until we meet again</div>

  <div class="names">
    Morty Mort <span class="amp">&</span> King Julien
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="countdown">
    <div class="unit">
      <div class="unit-num" id="d">--</div>
      <div class="unit-lbl">days</div>
    </div>
    <div class="unit">
      <div class="unit-num" id="h">--</div>
      <div class="unit-lbl">hours</div>
    </div>
    <div class="unit">
      <div class="unit-num" id="m">--</div>
      <div class="unit-lbl">min</div>
    </div>
    <div class="unit">
      <div class="unit-num" id="s">--</div>
      <div class="unit-lbl">sec</div>
    </div>
  </div>

  <div class="subline" id="subline">set a date below</div>

  <div class="date-setter">
    <div class="date-setter-label">reunion date</div>
    <input type="datetime-local" id="target-input" />
  </div>
</div>

<script>
  const STORAGE_KEY = 'morty-julien-reunion';
  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const subline = document.getElementById('subline');
  const input = document.getElementById('target-input');

  let targetMs = null;
  let ticker = null;

  const phrases = [
    'every second counts',
    'worth every moment',
    'the distance is only temporary',
    'soon',
  ];
  let phraseIdx = 0;

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    if (!targetMs) return;
    const diff = targetMs - Date.now();

    if (diff <= 0) {
      dEl.textContent = '00'; hEl.textContent = '00';
      mEl.textContent = '00'; sEl.textContent = '00';
      [dEl,hEl,mEl,sEl].forEach(el => { el.classList.remove('ticking'); el.classList.add('celebrate'); });
      subline.textContent = 'the moment has arrived';
      subline.style.color = 'var(--accent)';
      clearInterval(ticker);
      return;
    }

    const totalSec = Math.floor(diff / 1000);
    const days  = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins  = Math.floor((totalSec % 3600) / 60);
    const secs  = totalSec % 60;

    dEl.textContent = pad(days);
    hEl.textContent = pad(hours);
    mEl.textContent = pad(mins);
    sEl.textContent = pad(secs);
  }

  function startCountdown(ms) {
    targetMs = ms;
    clearInterval(ticker);
    [dEl,hEl,mEl,sEl].forEach(el => { el.classList.remove('celebrate'); });
    sEl.classList.add('ticking');
    subline.textContent = phrases[phraseIdx % phrases.length];
    subline.style.color = '';
    tick();
    ticker = setInterval(() => {
      tick();
      phraseIdx++;
      if (phraseIdx % 30 === 0) {
        subline.style.opacity = '0';
        subline.style.transition = 'opacity 0.6s';
        setTimeout(() => {
          subline.textContent = phrases[Math.floor(phraseIdx / 30) % phrases.length];
          subline.style.opacity = '1';
        }, 600);
      }
    }, 1000);
  }

  // Load from localStorage on page load
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const ms = parseInt(saved, 10);
    if (!isNaN(ms) && ms > Date.now()) {
      // Restore input value
      const d = new Date(ms);
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 16);
      input.value = local;
      startCountdown(ms);
    }
  }

  input.addEventListener('change', function () {
    const val = this.value;
    if (!val) return;
    const ms = new Date(val).getTime();
    if (isNaN(ms)) return;
    localStorage.setItem(STORAGE_KEY, String(ms));
    startCountdown(ms);
  });
</script>
</body>
</html>
